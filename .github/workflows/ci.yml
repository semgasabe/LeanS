name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        # Tests use mocked DB so no real database is needed in CI
        env:
          DATABASE_URL: postgresql://fake/test
          JWT_SECRET: test-secret-key-that-is-long-enough-32chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-long-enough-here
          PORT: 3001
          NODE_ENV: test
          TENANT_ID: tenant_test
          DECAY_THRESHOLD_DAYS: 30
          DECAY_PERCENT: 10
          DECAY_MAX_PERCENT: 50
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test  # only build image if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t leanstock-api:ci .

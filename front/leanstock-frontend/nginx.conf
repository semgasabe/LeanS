server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static SPA only — API calls go to VITE_API_URL (public API domain).
    # Do NOT proxy to semgasabe-leans-api.web here: nginx fails at boot if API is down.

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}

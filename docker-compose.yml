

services:
  api:
    build: .
    entrypoint: ["/bin/sh", "./entrypoint.sh"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://leanstock:leanstock@db:5432/leanstock
      JWT_SECRET: super-secret-jwt-key-change-in-production-must-be-32chars
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production-32chars
      PORT: 3000
      NODE_ENV: development
      TENANT_ID: tenant_default
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      # Dead stock decay config (configurable)
      DECAY_THRESHOLD_DAYS: 30
      DECAY_PERCENT: 10
      DECAY_MAX_PERCENT: 50
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./front/leanstock-frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:3000/api/v1
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: leanstock
      POSTGRES_DB: leanstock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanstock"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:

services:
  api:
    build: .
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://leanstock:leanstock@db:5432/leanstock
      REDIS_URL: redis://redis:6379
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://semgasabe-leanstock-frontend.kazi.rocks,https://semgasabe-leanstock.kazi.rocks}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SEED_DEV_ADMIN: ${SEED_DEV_ADMIN:-true}
      DECAY_THRESHOLD_DAYS: ${DECAY_THRESHOLD_DAYS:-30}
      DECAY_PERCENT: ${DECAY_PERCENT:-10}
      DECAY_MAX_PERCENT: ${DECAY_MAX_PERCENT:-50}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./front/leanstock-frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: leanstock
      POSTGRES_DB: leanstock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanstock"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: